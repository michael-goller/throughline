<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Presentation screen -->
  <rect x="3" y="4" width="22" height="16" rx="2" fill="url(#screen)" opacity="0.9"/>
  <!-- Screen bezel -->
  <rect x="5" y="6" width="18" height="12" rx="1" fill="#1e1b4b" opacity="0.6"/>
  <!-- Slide lines -->
  <rect x="7" y="9" width="10" height="1.5" rx="0.75" fill="white" opacity="0.8"/>
  <rect x="7" y="12" width="7" height="1.2" rx="0.6" fill="white" opacity="0.5"/>
  <rect x="7" y="14.5" width="8" height="1.2" rx="0.6" fill="white" opacity="0.5"/>
  <!-- Stand -->
  <rect x="12" y="20" width="4" height="2" fill="url(#screen)" opacity="0.7"/>
  <rect x="9" y="22" width="10" height="1.5" rx="0.75" fill="url(#screen)" opacity="0.6"/>
  <!-- AI Sparkle (4-point star) -->
  <path d="M26 4 L27.2 7.8 L31 9 L27.2 10.2 L26 14 L24.8 10.2 L21 9 L24.8 7.8 Z" fill="url(#sparkle)"/>
  <!-- Small sparkle -->
  <path d="M22 17 L22.6 18.8 L24.5 19.4 L22.6 20 L22 21.8 L21.4 20 L19.5 19.4 L21.4 18.8 Z" fill="url(#sparkle)" opacity="0.7"/>
  <!-- Tiny sparkle -->
  <circle cx="28" cy="16" r="0.8" fill="#fbbf24" opacity="0.5"/>
</svg>
